<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Daily Packing App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .status-under { background-color: #f59e0b; color: white; }
    .status-packed { background-color: #10b981; color: white; }
    table { min-width: 100%; }
    th, td { padding: 12px 8px; font-size: 0.95rem; }
    .modal { animation: pop 0.3s; }
    @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-4 md:p-6">
    <h1 class="text-3xl md:text-4xl font-bold text-center mb-1 text-indigo-700">📦 Daily Packing</h1>
    <p class="text-center text-gray-600 mb-6 text-sm">Team A–H • QR Support • Google Sheets Sync</p>

    <div class="flex flex-wrap gap-3 mb-6 bg-white p-4 rounded-3xl shadow">
      <select id="teamSelect" class="flex-1 px-5 py-4 text-base font-medium border rounded-2xl focus:outline-none focus:border-indigo-500"></select>
      <button onclick="loadData()" class="px-6 py-4 bg-indigo-600 text-white rounded-2xl hover:bg-indigo-700 flex items-center gap-2 text-base">
        <i class="fas fa-refresh"></i> Refresh
      </button>
      <button onclick="showAddModal()" class="flex-1 md:flex-none px-6 py-4 bg-emerald-600 text-white rounded-2xl hover:bg-emerald-700 flex items-center justify-center gap-2 text-base font-medium">
        <i class="fas fa-plus"></i> New Entry
      </button>
    </div>

    <div class="bg-white rounded-3xl shadow overflow-x-auto">
      <table class="w-full">
        <thead class="bg-indigo-700 text-white sticky top-0">
          <tr>
            <th class="text-left">Date</th>
            <th class="text-left">Customer</th>
            <th class="text-left">PI No.</th>
            <th class="text-left">Part No.</th>
            <th class="text-center">QTY</th>
            <th class="text-center">Cartons</th>
            <th class="text-left">Packed By</th>
            <th class="text-center">Status</th>
            <th class="w-20">Action</th>
          </tr>
        </thead>
        <tbody id="tableBody" class="divide-y text-sm"></tbody>
      </table>
    </div>
  </div>

  <!-- Add Modal -->
  <div id="addModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl w-full max-w-lg modal overflow-hidden">
      <div class="p-6">
        <h2 class="text-2xl font-bold mb-6">New Packing Entry</h2>

        <div class="space-y-6">
          <div>
            <label class="block text-sm mb-1 font-medium">Date</label>
            <input type="date" id="dateInput" class="w-full px-4 py-3 border rounded-2xl text-base">
          </div>

          <div class="grid grid-cols-1 gap-4">
            <div>
              <label class="block text-sm mb-1 font-medium">Customer Name</label>
              <div class="flex gap-2">
                <input type="text" id="customerInput" class="flex-1 px-4 py-3 border rounded-2xl text-base">
                <button onclick="scanQR('customer')" class="px-6 bg-gray-100 hover:bg-gray-200 rounded-2xl text-xl">📷</button>
              </div>
            </div>
            <div>
              <label class="block text-sm mb-1 font-medium">PI No.</label>
              <div class="flex gap-2">
                <input type="text" id="piInput" class="flex-1 px-4 py-3 border rounded-2xl text-base">
                <button onclick="scanQR('pi')" class="px-6 bg-gray-100 hover:bg-gray-200 rounded-2xl text-xl">📷</button>
              </div>
            </div>
            <div>
              <label class="block text-sm mb-1 font-medium">Part Number</label>
              <div class="flex gap-2">
                <input type="text" id="partInput" class="flex-1 px-4 py-3 border rounded-2xl text-base">
                <button onclick="scanQR('part')" class="px-6 bg-gray-100 hover:bg-gray-200 rounded-2xl text-xl">📷</button>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm mb-1 font-medium">QTY</label>
              <input type="number" id="qtyInput" value="1" class="w-full px-4 py-3 border rounded-2xl text-base">
            </div>
            <div>
              <label class="block text-sm mb-1 font-medium">QTY Carton</label>
              <input type="number" id="qtyCartonInput" value="1" class="w-full px-4 py-3 border rounded-2xl text-base">
            </div>
          </div>

          <div>
            <label class="block text-sm mb-1 font-medium">Packed By</label>
            <input type="text" id="packedByInput" placeholder="Your name" class="w-full px-4 py-3 border rounded-2xl text-base">
          </div>

          <div>
            <label class="block text-sm mb-1 font-medium">Status</label>
            <select id="statusInput" class="w-full px-4 py-3 border rounded-2xl text-base">
              <option value="under packing">Under Packing (Orange)</option>
              <option value="packed">Packed (Green)</option>
            </select>
          </div>
        </div>

        <div class="flex gap-3 mt-8">
          <button onclick="hideAddModal()" class="flex-1 py-4 text-gray-600 font-medium border border-gray-300 rounded-2xl">Cancel</button>
          <button onclick="submitEntry()" class="flex-1 py-4 bg-emerald-600 text-white font-semibold rounded-2xl">Save Entry</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ================== YOUR WEB APP URL (already added) ==================
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby8tGR_Vy7Ivb5fCjX5uaJ8NVNgSSmc2P7uULtVoKK-pwsouGTtCWjfCC_GTkpma_RS/exec';

    const teams = ["Team A","Team B","Team C","Team D","Team E","Team F","Team G","Team H"];
    let currentTeam = "Team A";

    function populateTeams() {
      const sel = document.getElementById('teamSelect');
      sel.innerHTML = teams.map(t => `<option value="${t}">${t}</option>`).join('');
      sel.value = currentTeam;
      sel.onchange = () => { currentTeam = sel.value; loadData(); };
    }

    async function loadData() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '<tr><td colspan="9" class="text-center py-16"><i class="fas fa-spinner fa-spin text-4xl"></i><p class="mt-4">Loading...</p></td></tr>';

      try {
        const res = await fetch(`${WEB_APP_URL}?action=getTeamData&team=${encodeURIComponent(currentTeam)}`);
        const json = await res.json();
        if (json.error) throw json.error;

        const rows = (json.data || []).slice(1);
        let html = '';
        rows.forEach((r, i) => {
          const rowNum = i + 2;
          const status = (r[7] || '').toLowerCase().trim();
          const cls = status === 'packed' ? 'status-packed' : 'status-under';
          html += `
            <tr class="hover:bg-gray-50">
              <td>${r[0]||''}</td><td>${r[1]||''}</td><td>${r[2]||''}</td><td>${r[3]||''}</td>
              <td class="text-center">${r[4]||''}</td><td class="text-center">${r[5]||''}</td>
              <td>${r[6]||''}</td>
              <td class="text-center">
                <span onclick="toggleStatus('${currentTeam}',${rowNum},'${status}')" class="cursor-pointer px-5 py-1.5 text-xs font-bold rounded-3xl ${cls}">
                  ${r[7]||'under packing'}
                </span>
              </td>
              <td class="text-center">
                <button onclick="toggleStatus('${currentTeam}',${rowNum},'${status}')" class="text-indigo-600">↻</button>
              </td>
            </tr>`;
        });
        tbody.innerHTML = html || '<tr><td colspan="9" class="text-center py-16 text-gray-400">No entries yet</td></tr>';
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="9" class="text-center py-16 text-red-600">Error: ${e}</td></tr>`;
      }
    }

    async function toggleStatus(team, row, curr) {
      const newSt = curr === 'packed' ? 'under packing' : 'packed';
      if (!confirm(`Change to "${newSt}"?`)) return;
      try {
        await fetch(WEB_APP_URL, {
          method:'POST',
          body: JSON.stringify({action:'updateStatus', team, row, status: newSt}),
          headers:{'Content-Type':'application/json'}
        });
        loadData();
      } catch(err){ alert('Status update failed'); }
    }

    function showAddModal() {
      document.getElementById('addModal').classList.remove('hidden');
      document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
    }
    function hideAddModal() { document.getElementById('addModal').classList.add('hidden'); }

    async function submitEntry() {
      const payload = {
        action: 'addEntry',
        team: currentTeam,
        date: document.getElementById('dateInput').value,
        customer: document.getElementById('customerInput').value.trim(),
        pi: document.getElementById('piInput').value.trim(),
        part: document.getElementById('partInput').value.trim(),
        qty: Number(document.getElementById('qtyInput').value) || 0,
        qtyCarton: Number(document.getElementById('qtyCartonInput').value) || 0,
        packedBy: document.getElementById('packedByInput').value.trim() || 'Unknown',
        status: document.getElementById('statusInput').value
      };

      if (!payload.customer || !payload.pi || !payload.part) {
        alert('Customer, PI No. and Part Number are required!');
        return;
      }

      try {
        const res = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
          headers: { 'Content-Type': 'application/json' }
        });
        const json = await res.json();

        if (json.success) {
          hideAddModal();
          loadData();
          ['customerInput','piInput','partInput'].forEach(id => document.getElementById(id).value = '');
          alert('✅ Saved successfully!');
        } else {
          alert('❌ Save failed: ' + (json.error || 'Unknown reason'));
        }
      } catch (e) {
        alert('Network error. Please redeploy the web app if you made changes.');
        console.error(e);
      }
    }

    // QR Scan using image file (works reliably on mobile)
    function scanQR(field) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.capture = 'environment';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        try {
          const html5QrCode = new Html5Qrcode("dummy");
          const result = await html5QrCode.scanFile(file, true);
          const text = result.decodedText;

          if (field === 'customer') document.getElementById('customerInput').value = text;
          else if (field === 'pi') document.getElementById('piInput').value = text;
          else if (field === 'part') document.getElementById('partInput').value = text;

          alert(`✅ Scanned: ${text}`);
        } catch (err) {
          alert('Could not read QR code from image.\n\nTry a clearer photo or type manually.');
          console.error(err);
        }
      };
      input.click();
    }

    // Initialize
    window.onload = () => {
      populateTeams();
      loadData();
    };
  </script>
</body>
</html>
