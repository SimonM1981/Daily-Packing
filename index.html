<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Daily Packing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .status-under { background-color: #f59e0b; color: white; }
    .status-next  { background-color: #eab308; color: white; }
    .status-packed { background-color: #10b981; color: white; }
    th, td { padding: 8px 6px; font-size: 0.85rem; white-space: nowrap; }
    .modal-content { max-height: 88vh; overflow-y: auto; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20">
  <div class="max-w-7xl mx-auto px-3 pt-4">
    <!-- Header -->
    <div class="flex items-center justify-center gap-2 mb-4">
      <span class="text-3xl">📦</span>
      <h1 class="text-2xl font-bold text-indigo-700">Daily Packing</h1>
    </div>
    <p class="text-center text-gray-600 text-xs mb-6">Database • Team A–H • Live QR</p>

    <!-- Controls (Database view) -->
    <div class="bg-white rounded-3xl shadow p-3 flex flex-wrap gap-2 items-center mb-6">
      <select id="teamSelect" class="flex-1 px-4 py-2.5 text-sm border rounded-2xl"></select>
      <input type="date" id="dateFilter" class="px-4 py-2.5 border rounded-2xl text-sm">
      <button onclick="loadData()" class="px-5 py-2.5 bg-indigo-600 text-white rounded-2xl text-sm">
        <i class="fas fa-refresh"></i>
      </button>
      <button onclick="showAddModal()" 
              class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-6 rounded-3xl flex items-center justify-center gap-2 text-base">
        <i class="fas fa-plus"></i> New Entry
      </button>
    </div>

    <!-- Database Table -->
    <div class="bg-white rounded-3xl shadow overflow-x-auto">
      <table class="w-full">
        <thead class="bg-violet-600 text-white text-xs">
          <tr>
            <th class="text-left pl-3">Date</th>
            <th class="text-left">Customer</th>
            <th class="text-left">PI No.</th>
            <th class="text-left">Part</th>
            <th class="text-center">QTY</th>
            <th class="text-center">Carton</th>
            <th class="text-left">By</th>
            <th class="text-center">Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody" class="divide-y text-xs"></tbody>
      </table>
    </div>
  </div>

  <!-- New Entry Modal -->
  <div id="addModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-3">
    <div class="bg-white rounded-3xl w-full max-w-md modal-content shadow-2xl">
      <div class="p-5">
        <h2 class="text-xl font-bold mb-5 text-center">New Entry</h2>
        
        <div class="space-y-4 text-sm">
          <div>
            <label class="block mb-1 font-medium">Date</label>
            <input type="date" id="dateInput" class="w-full px-4 py-3 border rounded-2xl">
          </div>

          <div class="grid grid-cols-1 gap-4">
            <div>
              <label class="block mb-1 font-medium">Customer Name</label>
              <div class="flex gap-2">
                <input type="text" id="customerInput" class="flex-1 px-4 py-3 border rounded-2xl">
                <button onclick="startLiveQR('customer')" class="px-5 bg-gray-100 hover:bg-gray-200 rounded-2xl text-xl">📷</button>
              </div>
            </div>
            <div>
              <label class="block mb-1 font-medium">PI No.</label>
              <div class="flex gap-2">
                <input type="text" id="piInput" class="flex-1 px-4 py-3 border rounded-2xl">
                <button onclick="startLiveQR('pi')" class="px-5 bg-gray-100 hover:bg-gray-200 rounded-2xl text-xl">📷</button>
              </div>
            </div>
            <div>
              <label class="block mb-1 font-medium">Part Number</label>
              <div class="flex gap-2">
                <input type="text" id="partInput" class="flex-1 px-4 py-3 border rounded-2xl">
                <button onclick="startLiveQR('part')" class="px-5 bg-gray-100 hover:bg-gray-200 rounded-2xl text-xl">📷</button>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block mb-1 font-medium">QTY</label>
              <input type="number" id="qtyInput" value="1" class="w-full px-4 py-3 border rounded-2xl">
            </div>
            <div>
              <label class="block mb-1 font-medium">QTY Carton</label>
              <input type="number" id="qtyCartonInput" value="1" class="w-full px-4 py-3 border rounded-2xl">
            </div>
          </div>

          <div>
            <label class="block mb-1 font-medium">Packed By</label>
            <input type="text" id="packedByInput" placeholder="Your name" class="w-full px-4 py-3 border rounded-2xl">
          </div>

          <div>
            <label class="block mb-1 font-medium">Status</label>
            <select id="statusInput" class="w-full px-4 py-3 border rounded-2xl">
              <option value="under packing">Under Packing (Orange)</option>
              <option value="next day">Next Day (Yellow)</option>
              <option value="packed">Packed (Green)</option>
            </select>
          </div>
        </div>

        <div class="flex gap-3 mt-8 sticky bottom-0 bg-white pt-4 border-t">
          <button onclick="hideAddModal()" class="flex-1 py-4 text-gray-600 font-medium border border-gray-300 rounded-2xl">Cancel</button>
          <button onclick="submitEntry()" class="flex-1 py-4 bg-emerald-600 text-white font-semibold rounded-2xl">Save Entry</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Silent Live QR Scanner -->
  <div id="qrModal" class="hidden fixed inset-0 bg-black z-[100] flex flex-col">
    <div class="p-4 text-white flex justify-between">
      <h3 id="qrTitle" class="text-lg font-semibold">Scan QR Code</h3>
      <button onclick="stopLiveQR()" class="text-3xl leading-none">✕</button>
    </div>
    <div id="qr-reader" class="flex-1"></div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby8tGR_Vy7Ivb5fCjX5uaJ8NVNgSSmc2P7uULtVoKK-pwsouGTtCWjfCC_GTkpma_RS/exec';  // ← Update if you got a new URL after redeploy

    const teams = ["Team A","Team B","Team C","Team D","Team E","Team F","Team G","Team H"];
    let currentTeam = "Team A";
    let html5QrCode = null;
    let currentQRField = null;

    function populateTeams() {
      const sel = document.getElementById('teamSelect');
      sel.innerHTML = teams.map(t => `<option value="${t}">${t}</option>`).join('');
      sel.value = currentTeam;
      sel.onchange = () => { currentTeam = sel.value; loadData(); };
    }

    async function loadData() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = `<tr><td colspan="9" class="text-center py-10"><i class="fas fa-spinner fa-spin text-3xl"></i></td></tr>`;

      const selectedDate = document.getElementById('dateFilter').value;

      try {
        const res = await fetch(`${WEB_APP_URL}?action=getTeamData&team=${encodeURIComponent(currentTeam)}`);
        const json = await res.json();
        if (json.error) throw json.error;

        let rows = (json.data || []).slice(1);
        if (selectedDate) {
          rows = rows.filter(r => (r[0] || '').toString().split('T')[0] === selectedDate);
        }

        let html = '';
        rows.forEach((r, i) => {
          const rowNum = i + 2;
          const status = (r[7] || '').toLowerCase().trim();
          let cls = status === 'packed' ? 'status-packed' : (status === 'next day' ? 'status-next' : 'status-under');

          html += `
            <tr class="hover:bg-gray-50">
              <td class="pl-3">${r[0]||''}</td>
              <td>${r[1]||''}</td>
              <td>${r[2]||''}</td>
              <td>${r[3]||''}</td>
              <td class="text-center">${r[4]||''}</td>
              <td class="text-center">${r[5]||''}</td>
              <td>${r[6]||''}</td>
              <td class="text-center">
                <span onclick="cycleStatus('${currentTeam}',${rowNum},'${status}')" class="cursor-pointer px-4 py-1 text-xs font-bold rounded-3xl ${cls}">
                  ${r[7]||'under'}
                </span>
              </td>
              <td><button onclick="cycleStatus('${currentTeam}',${rowNum},'${status}')" class="text-violet-600">↻</button></td>
            </tr>`;
        });

        tbody.innerHTML = html || `<tr><td colspan="9" class="text-center py-10 text-gray-400 text-xs">No data for this date</td></tr>`;
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="9" class="text-center py-10 text-red-500">Error loading</td></tr>`;
      }
    }

    async function cycleStatus(team, row, curr) {
      let next = curr === 'under packing' ? 'next day' : (curr === 'next day' ? 'packed' : 'under packing');
      if (!confirm(`Change to "${next}"?`)) return;

      try {
        await fetch(WEB_APP_URL, {
          method: 'POST',
          redirect: 'follow',
          body: JSON.stringify({action:'updateStatus', team, row, status: next}),
          headers: {'Content-Type': 'text/plain;charset=utf-8'}
        });
        loadData();
      } catch(err){ alert('Failed to update status'); }
    }

    function showAddModal() {
      document.getElementById('addModal').classList.remove('hidden');
      document.getElementById('dateInput').value = document.getElementById('dateFilter').value || new Date().toISOString().split('T')[0];
    }

    function hideAddModal() {
      document.getElementById('addModal').classList.add('hidden');
    }

    async function submitEntry() {
      const payload = {
        action: 'addEntry',
        team: currentTeam,
        date: document.getElementById('dateInput').value,
        customer: document.getElementById('customerInput').value.trim(),
        pi: document.getElementById('piInput').value.trim(),
        part: document.getElementById('partInput').value.trim(),
        qty: Number(document.getElementById('qtyInput').value) || 0,
        qtyCarton: Number(document.getElementById('qtyCartonInput').value) || 0,
        packedBy: document.getElementById('packedByInput').value.trim() || 'Unknown',
        status: document.getElementById('statusInput').value
      };

      if (!payload.customer || !payload.pi || !payload.part) {
        alert('Customer, PI No. and Part Number are required!');
        return;
      }

      try {
        const res = await fetch(WEB_APP_URL, {
          method: 'POST',
          redirect: 'follow',
          body: JSON.stringify(payload),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        const json = await res.json();

        if (json.success) {
          hideAddModal();
          loadData();
          ['customerInput','piInput','partInput'].forEach(id => document.getElementById(id).value = '');
        } else {
          alert('Save failed: ' + (json.error || 'Unknown'));
        }
      } catch (e) {
        alert('Network error – redeploy the web app and try again.');
      }
    }

    // Silent Live QR Scanner
    async function startLiveQR(field) {
      currentQRField = field;
      document.getElementById('qrModal').classList.remove('hidden');
      document.getElementById('qrTitle').textContent = `Scan ${field.toUpperCase()}`;

      if (!html5QrCode) html5QrCode = new Html5Qrcode("qr-reader");

      try {
        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 12, qrbox: { width: 260, height: 260 } },
          (text) => {
            if (currentQRField === 'customer') document.getElementById('customerInput').value = text;
            else if (currentQRField === 'pi') document.getElementById('piInput').value = text;
            else if (currentQRField === 'part') document.getElementById('partInput').value = text;
            stopLiveQR();   // close silently
          },
          () => {}
        );
      } catch (err) {
        alert('Camera access needed');
      }
    }

    function stopLiveQR() {
      if (html5QrCode) html5QrCode.stop().catch(() => {});
      document.getElementById('qrModal').classList.add('hidden');
      currentQRField = null;
    }

    window.onload = () => {
      populateTeams();
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('dateFilter').value = today;
      document.getElementById('dateFilter').onchange = loadData;
      loadData();
    };
  </script>
</body>
</html>
