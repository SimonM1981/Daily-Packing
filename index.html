<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Daily Packing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .status-under { background-color: #f59e0b; color: white; }
    .status-next  { background-color: #eab308; color: white; }
    .status-packed { background-color: #10b981; color: white; }
    table { min-width: 100%; }
    th, td { padding: 10px 8px; font-size: 0.9rem; white-space: nowrap; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen pb-8">
  <div class="max-w-7xl mx-auto px-4 pt-6">
    <!-- Header like your screenshot -->
    <div class="flex items-center justify-center gap-3 mb-2">
      <span class="text-4xl">📦</span>
      <h1 class="text-3xl font-bold text-indigo-700">Daily Packing</h1>
    </div>
    <p class="text-center text-gray-600 text-sm mb-8">Team A–H • Live QR • Google Sheets Sync</p>

    <!-- Controls -->
    <div class="bg-white rounded-3xl shadow p-4 flex flex-wrap gap-3 items-center mb-6">
      <select id="teamSelect" class="flex-1 px-5 py-3 text-base font-medium border rounded-2xl focus:outline-none focus:border-indigo-500"></select>
      
      <input type="date" id="dateFilter" class="px-5 py-3 border rounded-2xl text-base">
      
      <button onclick="loadData()" class="px-6 py-3 bg-indigo-600 text-white rounded-2xl hover:bg-indigo-700 flex items-center gap-2">
        <i class="fas fa-refresh"></i>
      </button>
      
      <button onclick="showAddModal()" 
              class="flex-1 md:flex-none bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-lg py-4 px-8 rounded-3xl flex items-center justify-center gap-2">
        <i class="fas fa-plus"></i> New Entry
      </button>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-3xl shadow overflow-x-auto">
      <table class="w-full">
        <thead class="bg-violet-600 text-white">
          <tr>
            <th class="text-left">Date</th>
            <th class="text-left">Customer</th>
            <th class="text-left">PI No.</th>
            <th class="text-left">Part No.</th>
            <th class="text-center">QTY</th>
            <th class="text-center">Cartons</th>
            <th class="text-left">Packed By</th>
            <th class="text-center">Status</th>
            <th class="w-12"></th>
          </tr>
        </thead>
        <tbody id="tableBody" class="divide-y text-sm"></tbody>
      </table>
    </div>
  </div>

  <!-- Add Entry Modal (matches your first screenshot) -->
  <div id="addModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl">
      <div class="p-6">
        <h2 class="text-2xl font-bold mb-6 text-center">New Packing Entry</h2>
        
        <div class="space-y-6">
          <div>
            <label class="block text-sm font-medium mb-1">Date</label>
            <input type="date" id="dateInput" class="w-full px-4 py-3 border rounded-2xl text-base">
          </div>

          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium mb-1">Customer Name</label>
              <div class="flex gap-2">
                <input type="text" id="customerInput" class="flex-1 px-4 py-3 border rounded-2xl text-base">
                <button onclick="startLiveQR('customer')" class="px-6 bg-gray-100 hover:bg-gray-200 rounded-2xl text-2xl">📷</button>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">PI No.</label>
              <div class="flex gap-2">
                <input type="text" id="piInput" class="flex-1 px-4 py-3 border rounded-2xl text-base">
                <button onclick="startLiveQR('pi')" class="px-6 bg-gray-100 hover:bg-gray-200 rounded-2xl text-2xl">📷</button>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Part Number</label>
              <div class="flex gap-2">
                <input type="text" id="partInput" class="flex-1 px-4 py-3 border rounded-2xl text-base">
                <button onclick="startLiveQR('part')" class="px-6 bg-gray-100 hover:bg-gray-200 rounded-2xl text-2xl">📷</button>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium mb-1">QTY</label>
              <input type="number" id="qtyInput" value="1" class="w-full px-4 py-3 border rounded-2xl text-base">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">QTY Carton</label>
              <input type="number" id="qtyCartonInput" value="1" class="w-full px-4 py-3 border rounded-2xl text-base">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Packed By</label>
            <input type="text" id="packedByInput" placeholder="Your name" class="w-full px-4 py-3 border rounded-2xl text-base">
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Status</label>
            <select id="statusInput" class="w-full px-4 py-3 border rounded-2xl text-base">
              <option value="under packing">Under Packing (Orange)</option>
              <option value="next day">Next Day (Yellow)</option>
              <option value="packed">Packed (Green)</option>
            </select>
          </div>
        </div>

        <div class="flex gap-3 mt-8">
          <button onclick="hideAddModal()" class="flex-1 py-4 text-gray-600 font-medium border border-gray-300 rounded-2xl">Cancel</button>
          <button onclick="submitEntry()" class="flex-1 py-4 bg-emerald-600 text-white font-semibold rounded-2xl">Save Entry</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Live QR Scanner Modal -->
  <div id="qrModal" class="hidden fixed inset-0 bg-black z-[100] flex flex-col">
    <div class="flex justify-between items-center p-4 text-white">
      <h3 class="text-xl font-semibold" id="qrTitle">Scan QR Code</h3>
      <button onclick="stopLiveQR()" class="text-3xl">✕</button>
    </div>
    <div id="qr-reader" class="flex-1 bg-black"></div>
    <div class="p-4 text-center text-white text-sm">Point camera at QR code</div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby8tGR_Vy7Ivb5fCjX5uaJ8NVNgSSmc2P7uULtVoKK-pwsouGTtCWjfCC_GTkpma_RS/exec';

    const teams = ["Team A","Team B","Team C","Team D","Team E","Team F","Team G","Team H"];
    let currentTeam = "Team A";
    let html5QrCode = null;
    let currentQRField = null;

    function populateTeams() {
      const sel = document.getElementById('teamSelect');
      sel.innerHTML = teams.map(t => `<option value="${t}">${t}</option>`).join('');
      sel.value = currentTeam;
      sel.onchange = () => { currentTeam = sel.value; loadData(); };
    }

    // Load data and filter by selected date
    async function loadData() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = `<tr><td colspan="9" class="text-center py-12"><i class="fas fa-spinner fa-spin text-4xl text-violet-600"></i><p class="mt-3">Loading...</p></td></tr>`;

      const selectedDate = document.getElementById('dateFilter').value;

      try {
        const res = await fetch(`${WEB_APP_URL}?action=getTeamData&team=${encodeURIComponent(currentTeam)}`);
        const json = await res.json();
        if (json.error) throw json.error;

        let rows = (json.data || []).slice(1);

        // Filter by date if selected
        if (selectedDate) {
          rows = rows.filter(row => {
            const rowDate = row[0] ? row[0].toString().split('T')[0] : '';
            return rowDate === selectedDate;
          });
        }

        let html = '';
        rows.forEach((r, i) => {
          const rowNum = i + 2;
          const status = (r[7] || '').toLowerCase().trim();
          let cls = '';
          if (status === 'packed') cls = 'status-packed';
          else if (status === 'next day') cls = 'status-next';
          else cls = 'status-under';

          html += `
            <tr class="hover:bg-gray-50">
              <td>${r[0]||''}</td>
              <td>${r[1]||''}</td>
              <td>${r[2]||''}</td>
              <td>${r[3]||''}</td>
              <td class="text-center">${r[4]||''}</td>
              <td class="text-center">${r[5]||''}</td>
              <td>${r[6]||''}</td>
              <td class="text-center">
                <span onclick="cycleStatus('${currentTeam}', ${rowNum}, '${status}')" 
                      class="cursor-pointer inline-block px-5 py-1 text-xs font-bold rounded-3xl ${cls}">
                  ${r[7] || 'under packing'}
                </span>
              </td>
              <td class="text-center">
                <button onclick="cycleStatus('${currentTeam}', ${rowNum}, '${status}')" class="text-violet-600 text-xl">↻</button>
              </td>
            </tr>`;
        });

        tbody.innerHTML = html || `<tr><td colspan="9" class="text-center py-12 text-gray-400">No entries for this date</td></tr>`;
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="9" class="text-center py-12 text-red-500">Error loading data</td></tr>`;
      }
    }

    // Cycle status: under packing → next day → packed
    async function cycleStatus(team, row, current) {
      let next = '';
      if (current === 'under packing') next = 'next day';
      else if (current === 'next day') next = 'packed';
      else next = 'under packing';

      if (!confirm(`Change status to "${next}"?`)) return;

      try {
        await fetch(WEB_APP_URL, {
          method: 'POST',
          redirect: 'follow',
          body: JSON.stringify({action: 'updateStatus', team, row, status: next}),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        loadData();
      } catch(err) {
        alert('Failed to update status');
      }
    }

    function showAddModal() {
      document.getElementById('addModal').classList.remove('hidden');
      document.getElementById('dateInput').value = document.getElementById('dateFilter').value || new Date().toISOString().split('T')[0];
      document.getElementById('packedByInput').value = document.getElementById('packedByInput').value || '';
    }

    function hideAddModal() {
      document.getElementById('addModal').classList.add('hidden');
    }

    async function submitEntry() {
      const payload = {
        action: 'addEntry',
        team: currentTeam,
        date: document.getElementById('dateInput').value,
        customer: document.getElementById('customerInput').value.trim(),
        pi: document.getElementById('piInput').value.trim(),
        part: document.getElementById('partInput').value.trim(),
        qty: Number(document.getElementById('qtyInput').value) || 0,
        qtyCarton: Number(document.getElementById('qtyCartonInput').value) || 0,
        packedBy: document.getElementById('packedByInput').value.trim() || 'Unknown',
        status: document.getElementById('statusInput').value
      };

      if (!payload.customer || !payload.pi || !payload.part) {
        alert('Customer, PI No. and Part Number are required!');
        return;
      }

      try {
        const res = await fetch(WEB_APP_URL, {
          method: 'POST',
          redirect: 'follow',
          body: JSON.stringify(payload),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        const json = await res.json();

        if (json.success) {
          hideAddModal();
          loadData();
          // clear fields
          ['customerInput','piInput','partInput'].forEach(id => document.getElementById(id).value = '');
          alert('✅ Saved successfully!');
        } else {
          alert('❌ Save failed: ' + (json.error || 'Unknown error'));
        }
      } catch (e) {
        alert('Network error – please redeploy the web app once more if needed.');
        console.error(e);
      }
    }

    // ================== LIVE QR SCANNER ==================
    async function startLiveQR(field) {
      currentQRField = field;
      document.getElementById('qrModal').classList.remove('hidden');
      document.getElementById('qrTitle').textContent = `Scan ${field.toUpperCase()}`;

      const readerDiv = document.getElementById('qr-reader');
      if (!html5QrCode) html5QrCode = new Html5Qrcode("qr-reader");

      try {
        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 12, qrbox: { width: 280, height: 280 } },
          (decodedText) => {
            if (currentQRField === 'customer') document.getElementById('customerInput').value = decodedText;
            else if (currentQRField === 'pi') document.getElementById('piInput').value = decodedText;
            else if (currentQRField === 'part') document.getElementById('partInput').value = decodedText;
            stopLiveQR();
            alert(`✅ Scanned: ${decodedText}`);
          },
          () => {} // silent error
        );
      } catch (err) {
        alert('Camera error. Make sure you allowed camera permission.');
        console.error(err);
      }
    }

    function stopLiveQR() {
      if (html5QrCode) html5QrCode.stop().catch(() => {});
      document.getElementById('qrModal').classList.add('hidden');
      currentQRField = null;
    }

    // Init
    window.onload = () => {
      populateTeams();
      // Default date = today
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('dateFilter').value = today;
      document.getElementById('dateFilter').onchange = loadData;
      loadData();
    };
  </script>
</body>
</html>
