<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Daily Packing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .status-under { background-color: #f59e0b; color: white; }
    .status-next  { background-color: #eab308; color: white; }
    .status-packed { background-color: #10b981; color: white; }
    th, td { padding: 10px 8px; font-size: 0.9rem; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-7xl mx-auto px-4 py-6">
    <div class="flex items-center justify-center gap-3 mb-2">
      <span class="text-4xl">📦</span>
      <h1 class="text-3xl font-bold text-indigo-700">Daily Packing</h1>
    </div>
    <p class="text-center text-gray-500 mb-8">Database • Team A–H • Live QR</p>

    <!-- Database View -->
    <div class="bg-white rounded-3xl shadow-lg p-5 mb-8">
      <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
        <i class="fas fa-database"></i> Database View
      </h2>
      <div class="flex flex-wrap gap-3 items-end">
        <div class="flex-1">
          <label class="block text-xs font-medium text-gray-500 mb-1">Team</label>
          <select id="teamSelect" class="w-full px-4 py-3 border border-gray-300 rounded-2xl text-base"></select>
        </div>
        <div class="flex-1">
          <label class="block text-xs font-medium text-gray-500 mb-1">Date</label>
          <input type="date" id="dateFilter" class="w-full px-4 py-3 border border-gray-300 rounded-2xl text-base">
        </div>
        <button onclick="loadData()" class="px-6 py-3 bg-indigo-600 text-white rounded-2xl hover:bg-indigo-700 flex items-center gap-2">
          <i class="fas fa-refresh"></i> Refresh
        </button>
        <button onclick="showAddModal()" class="flex-1 sm:flex-none bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 px-8 rounded-3xl flex items-center justify-center gap-2 text-base">
          <i class="fas fa-plus"></i> New Entry
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-3xl shadow-lg overflow-hidden">
      <div class="bg-violet-600 text-white px-5 py-4 font-medium">Packing Records</div>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="bg-violet-700 text-white text-sm">
              <th class="text-left pl-5 py-3">Date</th>
              <th class="text-left py-3">Customer</th>
              <th class="text-left py-3">PI No.</th>
              <th class="text-left py-3">Part No.</th>
              <th class="text-center py-3">QTY</th>
              <th class="text-center py-3">Carton</th>
              <th class="text-left py-3">Packed By</th>
              <th class="text-center py-3">Status</th>
              <th class="w-12 py-3"></th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y text-sm"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- New Entry Modal -->
  <div id="addModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl w-full max-w-md shadow-2xl">
      <div class="p-6">
        <h2 class="text-2xl font-bold mb-6 text-center">New Packing Entry</h2>
        
        <div class="space-y-5">
          <div>
            <label class="block text-sm font-medium mb-1">Date</label>
            <input type="date" id="dateInput" class="w-full px-4 py-3 border rounded-2xl">
          </div>

          <div class="grid grid-cols-1 gap-4">
            <div>
              <label class="block text-sm font-medium mb-1">Customer Name</label>
              <div class="flex gap-2">
                <input type="text" id="customerInput" class="flex-1 px-4 py-3 border rounded-2xl">
                <button onclick="startLiveQR('customer')" class="px-6 bg-gray-100 hover:bg-gray-200 rounded-2xl text-2xl">📷</button>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">PI No.</label>
              <div class="flex gap-2">
                <input type="text" id="piInput" class="flex-1 px-4 py-3 border rounded-2xl">
                <button onclick="startLiveQR('pi')" class="px-6 bg-gray-100 hover:bg-gray-200 rounded-2xl text-2xl">📷</button>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Part Number</label>
              <div class="flex gap-2">
                <input type="text" id="partInput" class="flex-1 px-4 py-3 border rounded-2xl">
                <button onclick="startLiveQR('part')" class="px-6 bg-gray-100 hover:bg-gray-200 rounded-2xl text-2xl">📷</button>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium mb-1">QTY</label>
              <input type="number" id="qtyInput" value="1" class="w-full px-4 py-3 border rounded-2xl">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">QTY Carton</label>
              <input type="number" id="qtyCartonInput" value="1" class="w-full px-4 py-3 border rounded-2xl">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Packed By</label>
            <input type="text" id="packedByInput" placeholder="Your name" class="w-full px-4 py-3 border rounded-2xl">
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Status</label>
            <select id="statusInput" class="w-full px-4 py-3 border rounded-2xl">
              <option value="under packing">Under Packing (Orange)</option>
              <option value="next day">Next Day (Yellow)</option>
              <option value="packed">Packed (Green)</option>
            </select>
          </div>
        </div>

        <div class="flex gap-3 mt-8">
          <button onclick="hideAddModal()" class="flex-1 py-4 text-gray-600 font-medium border border-gray-300 rounded-2xl">Cancel</button>
          <button onclick="submitEntry()" class="flex-1 py-4 bg-emerald-600 text-white font-semibold rounded-2xl">Save Entry</button>
        </div>
      </div>
    </div>
  </div>

  <!-- QR Scanner Modal -->
  <div id="qrModal" class="hidden fixed inset-0 bg-black z-[100] flex flex-col">
    <div class="p-4 text-white flex justify-between">
      <h3 id="qrTitle" class="text-lg font-semibold">Scan QR Code</h3>
      <button onclick="stopLiveQR()" class="text-3xl">✕</button>
    </div>
    <div id="qr-reader" class="flex-1"></div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby8tGR_Vy7Ivb5fCjX5uaJ8NVNgSSmc2P7uULtVoKK-pwsouGTtCWjfCC_GTkpma_RS/exec';

    const teams = ["Team A","Team B","Team C","Team D","Team E","Team F","Team G","Team H"];
    let currentTeam = "Team A";
    let html5QrCode = null;
    let currentQRField = null;

    function populateTeams() {
      const sel = document.getElementById('teamSelect');
      sel.innerHTML = teams.map(t => `<option value="${t}">${t}</option>`).join('');
      sel.value = currentTeam;
      sel.onchange = () => { currentTeam = sel.value; loadData(); };
    }

    async function loadData() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = `<tr><td colspan="9" class="text-center py-12 text-gray-500">Loading data...</td></tr>`;

      const selectedDate = document.getElementById('dateFilter').value;

      try {
        const res = await fetch(`${WEB_APP_URL}?action=getTeamData&team=${encodeURIComponent(currentTeam)}`);
        const json = await res.json();
        console.log("Response from server:", json);

        if (json.error) throw new Error(json.error);

        let rows = (json.data || []).slice(1);

        if (selectedDate) {
          rows = rows.filter(r => {
            const rowDate = (r[0] || '').toString().split('T')[0];
            return rowDate === selectedDate;
          });
        }

        let html = '';
        rows.forEach((r, i) => {
          const rowNum = i + 2;
          const status = (r[7] || '').toLowerCase().trim();
          let cls = status === 'packed' ? 'status-packed' : (status === 'next day' ? 'status-next' : 'status-under');

          html += `
            <tr class="hover:bg-gray-50">
              <td class="pl-5">${r[0]||''}</td>
              <td>${r[1]||''}</td>
              <td>${r[2]||''}</td>
              <td>${r[3]||''}</td>
              <td class="text-center">${r[4]||''}</td>
              <td class="text-center">${r[5]||''}</td>
              <td>${r[6]||''}</td>
              <td class="text-center">
                <span onclick="cycleStatus('${currentTeam}',${rowNum},'${status}')" class="cursor-pointer px-5 py-1 text-xs font-bold rounded-3xl ${cls}">
                  ${r[7] || 'Under Packing'}
                </span>
              </td>
              <td class="text-center"><button onclick="cycleStatus('${currentTeam}',${rowNum},'${status}')" class="text-indigo-600">↻</button></td>
            </tr>`;
        });

        tbody.innerHTML = html || `<tr><td colspan="9" class="text-center py-12 text-gray-400">No data for this date</td></tr>`;
      } catch (e) {
        console.error(e);
        tbody.innerHTML = `<tr><td colspan="9" class="text-center py-12 text-red-600">Error: ${e.message}</td></tr>`;
      }
    }

    async function cycleStatus(team, row, curr) {
      let next = curr === 'under packing' ? 'next day' : (curr === 'next day' ? 'packed' : 'under packing');
      if (!confirm(`Change to "${next}"?`)) return;

      try {
        await fetch(WEB_APP_URL, {
          method: 'POST',
          redirect: 'follow',
          body: JSON.stringify({action: 'updateStatus', team, row, status: next}),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        loadData();
      } catch (err) {
        alert('Failed to update status');
      }
    }

    function showAddModal() {
      document.getElementById('addModal').classList.remove('hidden');
      const today = document.getElementById('dateFilter').value || new Date().toISOString().split('T')[0];
      document.getElementById('dateInput').value = today;
    }

    function hideAddModal() {
      document.getElementById('addModal').classList.add('hidden');
    }

    async function submitEntry() {
      const payload = {
        action: 'addEntry',
        team: currentTeam,
        date: document.getElementById('dateInput').value,
        customer: document.getElementById('customerInput').value.trim(),
        pi: document.getElementById('piInput').value.trim(),
        part: document.getElementById('partInput').value.trim(),
        qty: Number(document.getElementById('qtyInput').value) || 0,
        qtyCarton: Number(document.getElementById('qtyCartonInput').value) || 0,
        packedBy: document.getElementById('packedByInput').value.trim() || 'Unknown',
        status: document.getElementById('statusInput').value
      };

      if (!payload.customer || !payload.pi || !payload.part) {
        alert("Customer, PI No. and Part Number are required!");
        return;
      }

      try {
        const res = await fetch(WEB_APP_URL, {
          method: 'POST',
          redirect: 'follow',
          body: JSON.stringify(payload),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        const json = await res.json();

        if (json.success) {
          hideAddModal();
          loadData();
          document.getElementById('customerInput').value = '';
          document.getElementById('piInput').value = '';
          document.getElementById('partInput').value = '';
          alert("✅ Saved successfully!");
        } else {
          alert("❌ Save failed: " + (json.error || "Unknown error"));
        }
      } catch (e) {
        alert("Network error. Please redeploy the script again.");
      }
    }

    // Live QR Scanner (silent)
    async function startLiveQR(field) {
      currentQRField = field;
      document.getElementById('qrModal').classList.remove('hidden');
      document.getElementById('qrTitle').textContent = `Scan ${field.toUpperCase()}`;

      if (!html5QrCode) html5QrCode = new Html5Qrcode("qr-reader");

      try {
        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 12, qrbox: { width: 260, height: 260 } },
          (text) => {
            if (currentQRField === 'customer') document.getElementById('customerInput').value = text;
            else if (currentQRField === 'pi') document.getElementById('piInput').value = text;
            else if (currentQRField === 'part') document.getElementById('partInput').value = text;
            stopLiveQR();
          },
          () => {}
        );
      } catch (err) {
        alert("Camera permission required");
      }
    }

    function stopLiveQR() {
      if (html5QrCode) html5QrCode.stop().catch(() => {});
      document.getElementById('qrModal').classList.add('hidden');
      currentQRField = null;
    }

    // Initialize
    window.onload = () => {
      populateTeams();
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('dateFilter').value = today;
      document.getElementById('dateFilter').onchange = loadData;
      loadData();
    };
  </script>
</body>
</html>
